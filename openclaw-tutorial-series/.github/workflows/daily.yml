name: daily-openclaw-tutorial

on:
  schedule:
    - cron: '0 10 * * *' # 18:00 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect sources
        run: python scripts/collect.py

      - name: Generate docs
        run: python scripts/generate.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sources.json output/
          git diff --cached --quiet || git commit -m "chore: daily openclaw tutorial update"
          git push
